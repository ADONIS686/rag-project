# ============================================================
# RAG 项目全局配置 (config.yaml)
# ============================================================

# --- 模型配置 ---
models:
  default: deepseek  # 默认模型，可选: deepseek | qwen | kimi | local | openai
  deepseek:
    model_name: deepseek-chat
    temperature: 0.1
    max_tokens: 1024
  qwen:
    model_name: qwen-plus
    temperature: 0.1
    max_tokens: 1024
  kimi:
    model_name: moonshot-v1-8k
    temperature: 0.1
    max_tokens: 1024
  local:
    model_name: llama3:8b-instruct
    temperature: 0.1
    max_tokens: 1024

# --- 向量数据库配置 ---
vector_db:
  db_path: ./milvus_demo.db
  collection_name: rag_documents
  hnsw:
    M: 16              # 每个节点的邻居数量
    ef_construction: 64  # 建库时的搜索范围

# --- Embedding 配置 ---
embedding:
  model_name: BAAI/bge-base-zh-v1.5  # BGE 中文向量模型
  dimension: 768

# --- 重排序配置 ---
reranker:
  model_name: BAAI/bge-reranker-base-v1.5
  top_k: 5  # 重排序后返回的条数
  max_length: 512

# --- 检索配置 ---
retrieval:
  bm25_top_k: 20    # BM25 检索返回数量
  vector_top_k: 20   # 向量检索返回数量
  final_top_k: 5     # 重排序后最终返回数量

# --- 文档解析配置 ---
document:
  parser: marker  # 文档解析器: marker | pypdf
  chunk_size: 500
  chunk_overlap: 50

# --- 缓存配置 ---
cache:
  enabled: true
  expire_days: 7
  cache_dir: ./cache

# --- 护栏配置 ---
guardrails:
  sensitive_words_path: ./config/sensitive_words.txt
  max_output_length: 2000
